<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixture Mundial 2026</title>
<meta name="theme-color" content="#1e6bff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#edf1f8; --bg2:#f6f8fc; --card:#fff; --line:#e2e7f1; --line2:#cbd3e4;
  --text:#16203a; --muted:#5b6580; --red:#e5103b; --green:#00b86b; --blue:#1e6bff;
  --cyan:#00b8d4; --gold:#ee9b00;
  --qual-bg:#e3f8ee; --qual-fg:#067d4b; --third-bg:#fff3d6; --third-fg:#8a5b00;
  --elim-bg:#fde7ec; --elim-fg:#b11233;
  /* themeables — por defecto: CLARO PREMIUM */
  --page-bg:linear-gradient(180deg,#f1f5fc,#e6edf7);
  --panel-bg:#ffffff; --th-bg:#f3f6fc; --input-bg:#f3f6fc; --pill-bg:#ffffff; --hover:#eaf1ff;
  --banner-grad:linear-gradient(135deg,#ffffff,#e9f0ff); --banner-lines:.55;
  --radius:16px; --blur:none;
  --shadow:0 10px 30px rgba(20,30,60,.10); --shadow-sm:0 3px 12px rgba(20,30,60,.08);
}
/* === OSCURO / GLASS === */
body[data-theme="glass"]{
  --bg2:rgba(255,255,255,.05); --line:rgba(255,255,255,.14); --line2:rgba(255,255,255,.22);
  --text:#eaf0ff; --muted:#9fb0d6;
  --page-bg:radial-gradient(1100px 480px at 50% -12%,#1d2c54,transparent),linear-gradient(160deg,#0a1124,#0e1830 55%,#0a1020);
  --panel-bg:rgba(255,255,255,.07); --th-bg:rgba(255,255,255,.05); --input-bg:rgba(255,255,255,.10);
  --pill-bg:rgba(255,255,255,.08); --hover:rgba(255,255,255,.12);
  --banner-grad:linear-gradient(135deg,#101a36,#0c1430); --banner-lines:.6;
  --radius:18px; --blur:saturate(140%) blur(12px);
  --shadow:0 12px 36px rgba(0,0,0,.5); --shadow-sm:0 4px 16px rgba(0,0,0,.4);
}
body[data-theme="glass"] .stand th,body[data-theme="glass"] .rank th{color:#c7d3ec}
/* === VIBRANTE / EDITORIAL === */
body[data-theme="bold"]{
  --page-bg:#eef1f8; --panel-bg:#ffffff; --radius:14px; --banner-lines:.25;
  --shadow:0 14px 30px rgba(20,30,60,.14); --shadow-sm:0 4px 14px rgba(20,30,60,.10);
  --banner-grad:linear-gradient(120deg,#e5103b,#8b1bd6 55%,#1e6bff);
}
body[data-theme="bold"] .banner .title b{color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.3)}
body[data-theme="bold"] .banner .sub{color:rgba(255,255,255,.92)}
body[data-theme="bold"] .panel h2,body[data-theme="bold"] .gcard h3{
  font-family:"Haettenschweiler","Impact","Arial Narrow",sans-serif;letter-spacing:.5px;text-transform:uppercase}
body[data-theme="bold"] .panel h2{font-size:24px}
body[data-theme="bold"] .panel .acc,body[data-theme="bold"] .gcard .acc{height:6px}
body[data-theme="bold"] .pill.active{transform:scale(1.05)}
body[data-theme="bold"] .panel,body[data-theme="bold"] .gcard{background:#fdfbff;border-color:rgba(30,107,255,.16)}
*{box-sizing:border-box}
@media (prefers-reduced-motion: reduce){*{transition:none !important;animation:none !important}}
html,body{overflow-x:hidden}
body{margin:0;background:var(--page-bg) fixed;color:var(--text);
  font-family:"Bahnschrift","Segoe UI",Tahoma,sans-serif;font-size:14px;
  -webkit-text-size-adjust:100%;min-height:100vh}
h1,h2,h3{margin:0;font-family:"Bahnschrift SemiBold Condensed","Arial Narrow",sans-serif;
  letter-spacing:.5px}
.cond{font-family:"Bahnschrift SemiBold Condensed","Arial Narrow",sans-serif}
button{font-family:inherit;cursor:pointer}

/* ---------- Banner ---------- */
.banner{position:relative;height:clamp(80px,15vw,104px);background:var(--banner-grad);
  overflow:hidden;border-bottom:4px solid transparent;
  border-image:linear-gradient(90deg,var(--red) 33%,var(--green) 33% 66%,var(--blue) 66%) 1}
.banner .lines{position:absolute;inset:0;opacity:var(--banner-lines);pointer-events:none}
.banner .title{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;padding:0 8px;text-align:center}
.banner .title b{font-family:"Haettenschweiler","Impact","Arial Narrow",sans-serif;
  font-size:clamp(22px,7vw,42px);letter-spacing:1px;color:var(--text);line-height:1;white-space:nowrap}
.banner .tro{font-size:clamp(16px,5vw,26px)}
.banner .bar{display:flex;gap:6px;margin-top:4px}
.banner .bar span{width:clamp(34px,11vw,70px);height:5px;border-radius:2px}
.banner .sub{color:var(--muted);font-size:clamp(9px,2.6vw,13px);letter-spacing:1.5px;white-space:nowrap}
.banner .title,.banner .lines{transition:transform .12s ease}
@media (min-width:641px) and (max-width:1024px){
  .tabwrap{padding-left:10px;padding-right:10px}
  .grid-groups{grid-template-columns:repeat(2,1fr)}
}

/* ---------- Toolbar / tabs ---------- */
.toolbar{display:flex;gap:8px;align-items:center;padding:10px 14px;flex-wrap:wrap}
.btn{border:0;border-radius:10px;padding:10px 16px;color:#fff;font-weight:bold;font-size:13px;
  transition:all .15s ease;box-shadow:var(--shadow-sm)}
.btn.blue{background:var(--blue)} .btn.green{background:var(--green)}
.btn.ghost{background:var(--panel-bg);color:var(--text);border:1px solid var(--line)}
.btn:hover{filter:brightness(.97);transform:translateY(-1px);box-shadow:var(--shadow)}
.btn:active{transform:translateY(0)}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.status{color:var(--muted);font-size:12px;align-self:center}
.tabs{display:flex;gap:8px;padding:6px 14px;flex-wrap:wrap}
.pill{border:1px solid var(--line2);background:var(--pill-bg);color:var(--muted);
  border-radius:18px;padding:8px 18px;font-weight:bold;font-size:13px;box-shadow:var(--shadow-sm);
  transition:transform .12s,box-shadow .12s}
.pill.active{color:#fff;border-color:transparent}
.tabwrap{padding:6px 14px 30px;max-width:1220px;margin:0 auto}
.tabpage{display:none} .tabpage.show{display:block;animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.pill:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.hint{color:var(--muted);font-size:12px;margin:6px 0 12px}

/* ---------- Grupos ---------- */
.grid-groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.gcard{background:var(--panel-bg);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow-sm);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);
  transition:transform .15s,box-shadow .15s}
.gcard:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.gcard .acc{height:4px}
.gcard h3{padding:8px 12px 2px;font-size:17px}
table{width:100%;border-collapse:collapse;font-size:13px}
.stand th{background:var(--th-bg);color:var(--muted);font-size:12px;font-weight:600;
  letter-spacing:.04em;text-align:center;padding:6px 5px}
.stand th:first-child,.stand td:first-child{text-align:left}
.stand td{padding:4px 6px;border-top:1px solid var(--line)}
.stand tr.q td{background:var(--qual-bg);color:var(--qual-fg)}
.stand tr.t3 td{background:var(--third-bg);color:var(--third-fg)}
.flag{width:21px;height:24px;object-fit:cover;vertical-align:middle;
  clip-path:polygon(0 0,100% 0,100% 62%,50% 100%,0 62%);
  filter:drop-shadow(.7px 0 0 #fff) drop-shadow(-.7px 0 0 #fff) drop-shadow(0 .7px 0 #fff)
         drop-shadow(0 -.7px 0 #fff) drop-shadow(0 1px 1.5px rgba(0,0,0,.3))}
.matches{padding:6px 12px 12px}
.mrow{display:flex;align-items:center;gap:4px;padding:2px 0;font-size:12px}
.mrow .t1,.mrow .t2{flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.mrow .t1{text-align:right} .mrow .t2{text-align:left}
.mrow input{width:30px;text-align:center;border:1px solid var(--line);border-radius:6px;
  padding:4px;background:var(--input-bg);color:var(--text);font-family:inherit;font-weight:bold;
  transition:border-color .15s,box-shadow .15s}
.mrow input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(30,107,255,.18)}

/* ---------- tablas genericas ---------- */
.panel{background:var(--panel-bg);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;margin:14px 0;box-shadow:var(--shadow);
  -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur)}
.panel.narrow{max-width:760px;margin-left:auto;margin-right:auto}
.panel .acc{height:4px}
.panel h2{padding:8px 14px 0;font-size:18px}
.panel .psub{padding:0 14px 6px;color:var(--muted);font-size:12px}
.panel .pbody{padding:0 14px 14px}
.rank{width:100%;border-collapse:collapse;font-size:13px}
.rank th{background:var(--th-bg);color:var(--muted);font-size:12px;font-weight:600;
  letter-spacing:.04em;padding:7px 8px;text-align:left}
.rank td{padding:4px 7px;border-top:1px solid var(--line)}
.rank tr.ok td{background:var(--qual-bg);color:var(--qual-fg)}
.rank tr.no td{background:var(--elim-bg);color:var(--elim-fg)}
.rank tr.top3 td{background:var(--third-bg);color:var(--third-fg)}
.center{text-align:center}
.rkpos{display:inline-block;min-width:30px;text-align:center;font-weight:bold;color:var(--blue);
  background:var(--th-bg);border-radius:7px;padding:1px 5px;margin-right:8px}
.rank tr td .flag{margin:0 6px}
.ftwrap{overflow-x:auto}
.rank th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
.rank th.sortable:hover{color:var(--text)}
.dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin:0 1px;vertical-align:middle}
.dot.w{background:var(--green)} .dot.d{background:#c9a227} .dot.l{background:var(--red)}
.streak{font-size:10px;color:var(--muted);margin-left:8px;white-space:nowrap}
.fbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.fbtn{border:1px solid var(--line2);background:var(--pill-bg);color:var(--muted);border-radius:20px;
  padding:5px 12px;font-size:12px;font-weight:bold}
.fbtn.on{background:var(--blue);color:#fff;border-color:transparent}
.search{width:100%;max-width:320px;padding:9px 12px;border:1px solid var(--line2);border-radius:10px;
  background:var(--input-bg);color:var(--text);font-family:inherit;margin-bottom:10px}
.search:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(30,107,255,.18)}
.champrow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;font-size:12px;
  color:var(--muted);font-weight:bold}
.champ-chip{display:inline-flex;align-items:center;gap:5px;background:var(--th-bg);border-radius:20px;
  padding:3px 10px;color:var(--text)}
select.search{max-width:240px;cursor:pointer}
.cal td{padding:7px 8px;vertical-align:middle}
.cal .dsep td{background:var(--th-bg);color:var(--muted);font-weight:bold;font-size:12px;
  letter-spacing:.04em;padding:8px}
.cal .hora{font-weight:bold;white-space:nowrap} .cal .tu{color:var(--muted);white-space:nowrap;font-size:12px}
.cal .sede{color:var(--muted);font-size:12px}
.cal .vs{color:var(--muted)} .cal .res{font-weight:bold}
.tagr{display:inline-block;font-size:10px;font-weight:bold;color:var(--muted);
  background:var(--th-bg);border-radius:6px;padding:1px 6px;margin-right:6px}
.cal .pt{white-space:nowrap}

/* ---------- Cuadro ---------- */
.bracket-scroll{overflow:auto;border:1px solid var(--line);border-radius:var(--radius);
  background:var(--panel-bg);box-shadow:var(--shadow-sm)}
.bracket{position:relative}
.bracket svg{position:absolute;inset:0;pointer-events:none}
.mbox{position:absolute;width:156px;background:var(--panel-bg);border:1px solid var(--line);
  border-radius:10px;box-shadow:var(--shadow-sm);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur)}
.mbox.real{border-color:var(--green);border-width:2px}
.mbox.final{border-color:var(--gold);border-width:2px}
.mbox .cab{font-size:9px;color:var(--muted);padding:3px 8px 0}
.mbox .row{display:flex;align-items:center;gap:6px;padding:4px 8px;font-size:12px;border-radius:6px;margin:1px 3px}
.mbox .row.clic{cursor:pointer} .mbox .row.clic:hover{background:var(--hover)}
.mbox .row.win{background:var(--green);color:#fff;font-weight:bold}
.mbox .row span{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rounds{display:flex;position:absolute;top:0;left:0}
.rtitle{position:absolute;font-size:14px;color:var(--text);font-weight:bold}
.champ{position:absolute;width:200px;background:#fff7dd;border:3px solid var(--gold);
  border-radius:16px;text-align:center;padding:8px}
.champ .hd{background:var(--gold);color:#fff;border-radius:8px;padding:3px;font-size:12px;font-weight:bold}
.champ .cup{font-size:52px;line-height:1}
.champ .nm{font-size:18px;font-weight:bold}
.acc-round{margin:8px 0;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.acc-round>summary{cursor:pointer;font-weight:bold;padding:11px 12px;background:var(--th-bg);list-style:none}
.acc-round>summary::-webkit-details-marker{display:none}
.acc-round>summary::before{content:"▸ ";color:var(--muted)}
.acc-round[open]>summary::before{content:"▾ "}
.mboxm{background:var(--panel-bg);border:1px solid var(--line);border-radius:10px;margin:8px;box-shadow:var(--shadow-sm)}
.mboxm.real{border-color:var(--green)} .mboxm.final{border-color:var(--gold);border-width:2px}
.mboxm .cab{font-size:9px;color:var(--muted);padding:4px 10px 0}
.rowm{display:flex;align-items:center;gap:8px;padding:10px;font-size:14px;border-radius:6px;margin:2px 4px}
.rowm.clic{cursor:pointer} .rowm.clic:active{background:var(--hover)}
.rowm.win{background:var(--green);color:#fff;font-weight:bold}
.rowm span{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ---------- Figuritas ---------- */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:14px}
.fig{width:100%;aspect-ratio:164/226;perspective:900px;cursor:pointer}
.fig-in{position:relative;width:100%;height:100%;transform-style:preserve-3d;
  transition:transform .6s cubic-bezier(.2,.7,.2,1)}
.fig.flip .fig-in{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;overflow:hidden;
  border:3px solid var(--edge);box-shadow:0 4px 10px rgba(0,0,0,.12)}
.face::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:
    radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,.55),transparent 42%),
    conic-gradient(from 0deg at var(--mx,50%) var(--my,50%),rgba(255,0,128,.22),rgba(0,230,255,.22),rgba(120,90,255,.22),rgba(255,210,0,.22),rgba(255,0,128,.22));
  mix-blend-mode:screen;opacity:0;transition:opacity .25s}
.fig.tilt .face::after{opacity:.85}
.back{transform:rotateY(180deg)}
/* tiers */
.t-oro{--edge:#8a5a00;--tint:#ee9b00;--band:#ffd66b;
  --metal:linear-gradient(135deg,#9a6c08 0%,#ffe79a 15%,#c98f1a 33%,#fff6cf 50%,#caa01f 67%,#ffe79a 84%,#8a5a00 100%)}
.t-plata{--edge:#828ba3;--tint:#aeb8c8;--band:#d7dee9;
  --metal:linear-gradient(135deg,#7f889e 0%,#ffffff 15%,#b3bdcf 33%,#f4f7fc 50%,#9aa6bd 67%,#ffffff 84%,#7f889e 100%)}
.t-bronce{--edge:#8e5e34;--tint:#b56a32;--band:#e6a15c;
  --metal:linear-gradient(135deg,#6b3517 0%,#f0c29a 15%,#a5693a 33%,#f6dcb6 50%,#9c6336 67%,#e6a15c 84%,#6b3517 100%)}
/* FRENTE */
.front{display:flex;flex-direction:column;align-items:center;padding:8px;color:#16203a}
/* metalizado (bandas claro/oscuro) + holografico */
.spotlight .front{
  background:
    repeating-linear-gradient(110deg,rgba(255,0,150,.13) 0 8px,rgba(0,230,255,.13) 8px 16px,rgba(120,90,255,.13) 16px 24px,rgba(255,210,0,.13) 24px 32px),
    radial-gradient(circle at 50% 28%,rgba(255,255,255,.5),transparent 46%),
    var(--metal);
  background-blend-mode:overlay,soft-light,normal}
.spotlight .fig.top3 .front{
  background:
    repeating-conic-gradient(from 0deg at 50% 30%,rgba(255,255,255,.28) 0 3deg,transparent 3deg 13deg),
    repeating-linear-gradient(110deg,rgba(255,0,150,.16) 0 8px,rgba(0,230,255,.16) 8px 16px,rgba(120,90,255,.16) 16px 24px,rgba(255,210,0,.16) 24px 32px),
    var(--metal);
  background-blend-mode:soft-light,overlay,normal}
.sticker .front{background:linear-gradient(#fff,#e8ebf1)}
.hud .front{background:
  repeating-linear-gradient(0deg,rgba(255,255,255,.06) 0 1px,transparent 1px 22px),
  repeating-linear-gradient(90deg,rgba(255,255,255,.06) 0 1px,transparent 1px 18px),
  linear-gradient(#101827,#1e3a5f);color:#fff}
.front .top{display:flex;width:100%;justify-content:space-between;align-items:flex-start}
.front .rt{font-family:"Haettenschweiler","Impact";font-size:30px;line-height:.9}
.front .stars{color:var(--tint);font-size:11px}
.front .cc{font-size:10px;font-weight:bold;opacity:.85}
.front .pho{width:74px;height:74px;border-radius:50%;object-fit:cover;margin:4px 0;
  border:3px solid #fff;outline:2px solid var(--edge);background:#dfe5f0}
.front .pho.ph{display:flex;align-items:center;justify-content:center;
  font-family:"Bahnschrift SemiBold Condensed";font-size:24px;color:#3a455f}
.front .phwrap{position:relative;width:74px;height:74px;margin:4px 0}
.front .phwrap .pho{position:absolute;inset:0;margin:0}
.front .nm{font-weight:bold;font-size:16px;text-align:center;line-height:1}
.front .co{font-size:10px;opacity:.8;margin-bottom:4px}
.front .badges{display:flex;gap:6px;margin-top:auto;width:100%}
.front .bd{flex:1;text-align:center;border:1px solid var(--edge);border-radius:9px;
  padding:2px;font-size:10px;font-weight:bold;background:rgba(255,255,255,.65)}
.hud .front .bd{background:transparent}
.sticker .front .pho{outline-color:var(--tint)}
/* DORSO */
.back{padding:7px;color:#1b2430;background:linear-gradient(var(--c-sec),var(--c-pri))}
.back .pat{position:absolute;inset:0;opacity:.5}
.back .bx{position:relative;background:rgba(255,255,255,.78);border-radius:7px;
  margin-bottom:4px;padding:4px 7px}
.back .hd{display:flex;justify-content:space-between;font-weight:bold;font-size:11px}
.back .id{display:flex;align-items:baseline;gap:6px}
.back .id .rt{font-family:"Haettenschweiler","Impact";font-size:24px}
.back .id .nm{font-weight:bold;font-size:13px;line-height:1}
.back .id .sub{font-size:8px;color:#526074}
.attr{display:flex;align-items:center;gap:5px;font-size:9px;margin:1px 0}
.attr b{width:24px} .attr .v{width:16px;text-align:right}
.attr .bar{flex:1;height:5px;background:#d9dee8;border-radius:3px;overflow:hidden}
.attr .bar i{display:block;height:100%;background:var(--tint)}
.back .sr{display:flex;gap:6px}
.back .sr>div{flex:1}
.back .lbl{font-weight:bold;font-size:8px}
.back .txt{font-size:8px;color:#263244;line-height:1.1}
.back .foot{position:relative;display:flex;justify-content:space-between;color:#fff;
  background:var(--c-dark);border-radius:7px;padding:3px 8px;font-size:9px;font-weight:bold;margin-top:2px}
.selector{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.selector .s{border:1px solid var(--line2);background:var(--bg2);color:var(--muted);
  border-radius:8px;padding:4px 12px;font-size:12px;font-weight:bold}
.selector .s.on{background:var(--blue);color:#fff;border-color:transparent}
.themesel{display:flex;gap:6px;margin-left:auto}
.themesel .tbtn{border:1px solid var(--line2);background:var(--pill-bg);color:var(--muted);
  border-radius:20px;padding:6px 12px;font-size:12px;font-weight:bold}
.themesel .tbtn.on{background:var(--blue);color:#fff;border-color:transparent;box-shadow:var(--shadow-sm)}
.fig{transition:transform .15s;content-visibility:auto;contain-intrinsic-size:auto 232px}
.fig:hover{transform:translateY(-4px)}
.fig:hover .fig-in{will-change:transform}

/* ---------- Responsive (celular) ---------- */
@media (max-width:640px){
  .toolbar,.tabs,.tabwrap{padding-left:8px;padding-right:8px}
  .toolbar{gap:6px;justify-content:flex-start}
  .btn{padding:10px 12px;font-size:12px;min-height:44px}
  .themesel{margin-left:0;flex-wrap:wrap}
  .themesel .tbtn{min-height:44px}
  .status{flex-basis:100%;margin-left:0;order:5}

/* ============================ ESTADO ============================ */
let DATA=null, GM=[], META={}, SCORES={}, REAL={}, KOWIN={}, KOREAL={}, RES={};
let TABLAS={}, MAPA3={}, KORES={}, ESTILO="spotlight", FLIP={}, PHOTOS={};
let FSORT="fifa", FDIR=1, FFILTER="all", FQ="", CALFILT="all", CALTEAM="all";

/* ============================ UTILS ============================ */
const flagUrl=t=>ISO[t]?`https://flagcdn.com/w40/${ISO[t]}.png`:"";
const flagImg=t=>ISO[t]?`<img class="flag" src="${flagUrl(t)}" alt="" width="21" height="24" loading="lazy" decoding="async">`:"";
const cc=t=>{const c=ISO[t]||"";return c.split("-").pop().toUpperCase();};
const esEtiqueta=n=>!n||/^[123][A-Z]?$/.test(n)||/^(W|L|Gan|Perd|3:)/.test(n)||n.includes("/")||n.includes("?")||n.startsWith("Gan.")||n.startsWith("Perd.");
const corto=(s,n)=>!s?s:(s.length<=n?s:s.slice(0,n-1)+".");
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ============================ FETCH / PARSE ============================ */
async function cargar(forzar){
  setStatus("Cargando…");
  let data=null;
  if(!forzar){try{const c=localStorage.getItem("wc26");if(c)data=JSON.parse(c);}catch(e){}}
  if(!data){
    try{const r=await fetch(DATA_URL);data=await r.json();
      try{localStorage.setItem("wc26",JSON.stringify(data));}catch(e){}
    }catch(e){const c=localStorage.getItem("wc26");if(c)data=JSON.parse(c);else{setStatus("Error al cargar datos");return;}}
  }
  DATA=data;parse();SCORES={...REAL};KOWIN={...KOREAL};
  setStatus(`${GM.length} partidos de grupo`);
  renderGrupos();recalcular();renderStats();renderCalendario();
  bajarFotos();
}
async function actualizar(){
  setStatus("Actualizando…");
  try{const r=await fetch(DATA_URL);const data=await r.json();
    localStorage.setItem("wc26",JSON.stringify(data));DATA=data;parse();
    SCORES={...REAL};KOWIN={...KOREAL};
    setStatus(`${GM.length} partidos · actualizado`);
    renderGrupos();recalcular();renderStats();renderCalendario();bajarFotos();
  }catch(e){setStatus("No se pudo actualizar (sin internet)");}
}
function parse(){
  GM=[];META={};REAL={};KOREAL={};
  for(const m of (DATA.matches||[])){
    const g=m.group||"";const num=m.num;
    if(g.startsWith("Group ")){
      const L=g.split(" ")[1];const t1=m.team1,t2=m.team2;
      let ft=null;const sc=m.score||{};
      if(Array.isArray(sc.ft)&&sc.ft.length===2)ft=[+sc.ft[0],+sc.ft[1]];
      const id=`${L}|${t1}|${t2}`;
      GM.push({id,g:L,t1,t2,fecha:m.date||"",ft});
      REAL[id]=ft?[...ft]:null;
    }else if(num!=null){
      META[num]={fecha:m.date||""};
      const sc=m.score||{};const ft=sc.ft;
      if(Array.isArray(ft)&&ft.length===2&&m.team1&&m.team2&&!esEtiqueta(m.team1)&&!esEtiqueta(m.team2)){
        let w=ft[0]>ft[1]?m.team1:(ft[1]>ft[0]?m.team2:null);
        if(!w&&Array.isArray(sc.p))w=sc.p[0]>sc.p[1]?m.team1:m.team2;
        if(w)KOREAL[+num]=w;
      }
    }
  }
}

/* ============================ STANDINGS ============================ */
function tabla(L){
  const eq={};
  for(const m of GM){if(m.g!==L)continue;for(const t of [m.t1,m.t2])
    if(!eq[t])eq[t]={eq:t,pj:0,g:0,e:0,p:0,gf:0,gc:0,dg:0,pts:0};}
  for(const m of GM){if(m.g!==L)continue;const r=RES[m.id];if(!r)continue;
    const[a,b]=r,A=eq[m.t1],B=eq[m.t2];
    A.pj++;B.pj++;A.gf+=a;A.gc+=b;B.gf+=b;B.gc+=a;
    if(a>b){A.g++;B.p++;A.pts+=3;}else if(a<b){B.g++;A.p++;B.pts+=3;}else{A.e++;B.e++;A.pts++;B.pts++;}}
  for(const e of Object.values(eq))e.dg=e.gf-e.gc;
  let t=Object.values(eq).sort((x,y)=>y.pts-x.pts||y.dg-x.dg||y.gf-x.gf||x.eq.localeCompare(y.eq));
  return desempate(t,L);
}
function desempate(t,L){
  const res=[];let i=0;
  while(i<t.length){let j=i+1;
    while(j<t.length&&t[j].pts===t[i].pts&&t[j].dg===t[i].dg&&t[j].gf===t[i].gf)j++;
    let sub=t.slice(i,j);
    if(sub.length>1)sub=h2h(sub,L);
    res.push(...sub);i=j;}
  return res;
}
function h2h(sub,L){
  const nm=new Set(sub.map(e=>e.eq));const mini={};nm.forEach(n=>mini[n]={pts:0,dg:0,gf:0});
  for(const m of GM){if(m.g!==L||!nm.has(m.t1)||!nm.has(m.t2))continue;const r=RES[m.id];if(!r)continue;
    const[a,b]=r;mini[m.t1].gf+=a;mini[m.t1].dg+=a-b;mini[m.t2].gf+=b;mini[m.t2].dg+=b-a;
    if(a>b)mini[m.t1].pts+=3;else if(a<b)mini[m.t2].pts+=3;else{mini[m.t1].pts++;mini[m.t2].pts++;}}
  return sub.sort((x,y)=>mini[y.eq].pts-mini[x.eq].pts||mini[y.eq].dg-mini[x.eq].dg||
    mini[y.eq].gf-mini[x.eq].gf||x.eq.localeCompare(y.eq));
}
function rankTerceros(){
  const ts=[];for(const L of GRUPOS){const t=TABLAS[L];if(t&&t.length>=3)ts.push([L,t[2]]);}
  ts.sort((a,b)=>b[1].pts-a[1].pts||b[1].dg-a[1].dg||b[1].gf-a[1].gf||a[1].eq.localeCompare(b[1].eq));
  return ts;
}
function asignarTerceros(letras){
  const slots=Object.keys(TSLOTS).map(Number).sort((a,b)=>a-b);
  const disp=new Set(letras);if(disp.size!==8)return {};
  const asig={};
  function bt(){
    if(Object.keys(asig).length===slots.length)return true;
    const rest=slots.filter(s=>!(s in asig)).sort((a,b)=>
      TSLOTS[a].filter(g=>disp.has(g)).length-TSLOTS[b].filter(g=>disp.has(g)).length||a-b);
    const slot=rest[0];
    for(const g of TSLOTS[slot].filter(g=>disp.has(g)).sort()){
      asig[slot]=g;disp.delete(g);if(bt())return true;disp.add(g);delete asig[slot];}
    return false;
  }
  return bt()?asig:{};
}

/* ============================ RESOLVER CUADRO ============================ */
function plaza(cod){
  if(cod[0]==="1"||cod[0]==="2"){const pos=+cod[0],L=cod[1],t=TABLAS[L]||[];
    return t.length>=pos?t[pos-1].eq:(pos===1?"1ro":"2do")+L;}
  if(cod.startsWith("3:")){const slot=+cod.slice(2),L=MAPA3[slot];
    if(L){const t=TABLAS[L]||[];if(t.length>=3)return t[2].eq;}return "3ro (?)";}
  if(cod[0]==="W"){const n=+cod.slice(1);return KOWIN[n]||("Gan. "+n);}
  if(cod[0]==="L"){const n=+cod.slice(1);const g=KOWIN[n],p=KORES[n];
    if(g&&p&&p[0]&&p[1])return p[0]===g?p[1]:p[0];return "Perd. "+n;}
  return cod;
}
function resolverCuadro(){
  KORES={};
  for(const[n,[c1,c2]]of Object.entries(R32))KORES[n]=[plaza(c1),plaza(c2)];
  for(const n of Object.keys(LLAVES).map(Number).sort((a,b)=>a-b))
    KORES[n]=[plaza(LLAVES[n][0]),plaza(LLAVES[n][1])];
  for(const n of Object.keys(KOWIN).map(Number)){const p=KORES[n];
    if(p&&!p.includes(KOWIN[n])&&!(n in KOREAL))delete KOWIN[n];}
}

/* ============================ RECALCULAR ============================ */
function recalcular(){
  for(const m of GM){const i1=document.getElementById("s_"+m.id+"_1"),i2=document.getElementById("s_"+m.id+"_2");
    if(i1&&i2){const v1=i1.value.trim(),v2=i2.value.trim();
      RES[m.id]=(v1===""&&v2==="")?null:[parseInt(v1||0)||0,parseInt(v2||0)||0];}
    else RES[m.id]=SCORES[m.id];}
  SCORES={...RES};
  TABLAS={};for(const L of GRUPOS)TABLAS[L]=tabla(L);
  pintarStandings();
  const rank=rankTerceros();const top8=rank.slice(0,8).map(x=>x[0]);
  MAPA3=asignarTerceros(top8);
  renderTerceros(rank);
  resolverCuadro();renderCuadro();
  renderFifa();
}
function restaurar(){RES={...REAL};SCORES={...REAL};KOWIN={...KOREAL};renderGrupos();recalcular();}

/* ============================ RENDER GRUPOS ============================ */
const ACENTOS=["#1e6bff","#e5103b","#00b86b","#00b8d4","#ee9b00","#8b5cf6"];
function renderGrupos(){
  const teams={};for(const m of GM){(teams[m.g]=teams[m.g]||new Set()).add(m.t1);teams[m.g].add(m.t2);}
  let h='<div class="grid-groups">';
  GRUPOS.forEach((L,idx)=>{
    h+=`<div class="gcard"><div class="acc" style="background:${ACENTOS[idx%6]}"></div>

      <table class="stand"><thead><tr><th>EQUIPO</th><th>PJ</th><th>DG</th><th>PTS</th></tr></thead>
      <tbody id="st_${L}"></tbody></table><div class="matches">`;
    GM.filter(m=>m.g===L).forEach(m=>{
      const r=SCORES[m.id];
      h+=`<div class="mrow"><span class="t1">${esc(corto(m.t1,12))}</span>${flagImg(m.t1)}
        <input id="s_${m.id}_1" value="${r?r[0]:""}" onchange="recalcular()">
        <span style="color:var(--muted)">:</span>
        <input id="s_${m.id}_2" value="${r?r[1]:""}" onchange="recalcular()">
        ${flagImg(m.t2)}<span class="t2">${esc(corto(m.t2,12))}</span></div>`;
    });
    h+=`</div></div>`;
  });
  h+='</div>';
  document.getElementById("tab-grupos").innerHTML=h;
}
function pintarStandings(){
  for(const L of GRUPOS){const tb=document.getElementById("st_"+L);if(!tb)continue;
    tb.innerHTML=TABLAS[L].map((e,i)=>{
      const cls=i<2?"q":(i===2?"t3":"");
      return `<tr class="${cls}"><td>${i+1}. ${flagImg(e.eq)} ${esc(corto(e.eq,16))}</td>
        <td class="center">${e.pj}</td><td class="center">${e.dg>=0?"+":""}${e.dg}</td>
        <td class="center"><b>${e.pts}</b></td></tr>`;}).join("");}
}

/* ============================ RENDER TERCEROS ============================ */
function renderTerceros(rank){
  let rows=rank.map(([L,e],i)=>{
    const cls=i<8?"ok":"no";let est=i<8?"CLASIFICA":"eliminado";
    const slot=Object.entries(MAPA3).find(([s,g])=>g===L);
    if(i<8&&slot)est="→ partido "+slot[0];
    return `<tr class="${cls}"><td>${i+1}. ${flagImg(e.eq)} ${esc(corto(e.eq,20))} (${L})</td>
      <td class="center">${e.pj}</td><td class="center">${e.dg>=0?"+":""}${e.dg}</td>
      <td class="center">${e.gf}</td><td class="center"><b>${e.pts}</b></td>
      <td class="center">${est}</td></tr>`;}).join("");
  document.getElementById("tab-terceros").innerHTML=`<div class="panel narrow">
    <div class="acc" style="background:var(--gold)"></div>
    <h2>RANKING DE TERCEROS — LOS 8 MEJORES CLASIFICAN</h2>
    <div class="pbody"><table class="rank"><thead><tr><th>EQUIPO (GR)</th><th class="center">PJ</th>
    <th class="center">DG</th><th class="center">GF</th><th class="center">PTS</th>
    <th class="center">ESTADO</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

/* ============================ RENDER CUADRO ============================ */

function renderCuadro(){

  const xFinal=x0+4*pitch;
  const feeders={};for(const[n,[a,b]]of Object.entries(LLAVES))feeders[n]=[+a.slice(1),+b.slice(1)];
  const posy={};
  LEFT_LEAF.forEach((n,i)=>posy[n]=y0+i*(ch+gap)+ch/2);
  RIGHT_LEAF.forEach((n,i)=>posy[n]=y0+i*(ch+gap)+ch/2);
  function cy(n){if(n in posy)return posy[n];const[a,b]=feeders[n];return posy[n]=(cy(a)+cy(b))/2;}
  for(const n of [...Object.keys(COL).map(Number),103])cy(n);

  const xpos=n=>{if(n===104||n===103)return xFinal;
    return LEFT_SET.has(n)?x0+COL[n]*pitch:x0+(8-COL[n])*pitch;};
  const totalW=x0+8*pitch+cw+30;
  const totalH=Math.max(y0+8*(ch+gap)+40, posy[104]+150+ch);

  let svg="";
  for(const n of Object.keys(LLAVES).map(Number)){if(n===103)continue;
    const px=xpos(n),py=posy[n];
    for(const f of feeders[n]){const cx=xpos(f),fy=posy[f];
      let fx,parentX;
      if(cx<px){fx=cx+cw;parentX=px;}else{fx=cx;parentX=px+cw;}
      const mid=(fx+parentX)/2;
      svg+=`<polyline points="${fx},${fy} ${mid},${fy} ${mid},${py} ${parentX},${py}" fill="none" stroke="#cbd3e4" stroke-width="2"/>`;}}
  let boxes="";
  // titulos de ronda: izquierda 0..3, centro FINAL, derecha espejado

  boxes+=`<div class="rtitle" style="left:${xFinal}px;top:14px;color:var(--gold)">FINAL</div>`;

    const depth=3-k; boxes+=`<div class="rtitle" style="left:${x0+(8-depth)*pitch}px;top:14px">${t}</div>`;});
  // partidos del arbol
  for(const n of Object.keys(COL).map(Number))boxes+=boxHtml(n,xpos(n),posy[n]-ch/2);

  const ty=posy[104]+130;

  boxes+=boxHtml(103,xFinal,ty);

  if(champ&&!esEtiqueta(champ)){
    boxes+=`<div class="champ" style="left:${xFinal-8}px;top:${posy[104]-160}px">
      <div class="hd">CAMPEÓN DEL MUNDO</div><div class="cup">🏆</div>
      <div class="nm">${flagImg(champ)} ${esc(corto(champ,16))}</div></div>`;
  }
  const sc=document.getElementById("tab-cuadro");
  const prev=sc.querySelector(".bracket-scroll");

  sc.innerHTML=`<div class="bracket-scroll" style="max-height:75vh">
    <div class="bracket" style="width:${totalW}px;height:${totalH}px">
    <svg width="${totalW}" height="${totalH}">${svg}</svg>${boxes}</div></div>`;
  const ns=sc.querySelector(".bracket-scroll");ns.scrollLeft=sx;ns.scrollTop=sy;
}

function goleadores(){
  const tot={};
  for(const x of (DATA.matches||[])){
    for(const[side,team]of [["goals1",x.team1],["goals2",x.team2]]){
      for(const g of (x[side]||[])){if(g.owngoal)continue;
        const k=(g.name||"?")+"|"+team;if(!tot[k])tot[k]={n:g.name||"?",t:team,g:0,p:0};
        tot[k].g++;if(g.penalty)tot[k].p++;}}}
  return Object.values(tot).sort((a,b)=>b.g-a.g||b.p-a.p||a.n.localeCompare(b.n));
}
function tierDe(g){return g>=5?"oro":(g>=3?"plata":"bronce");}
function rating(g,p){return Math.min(99,72+g*4+p);}
function stableDelta(name,key){let raw=name+"-"+key,v=0;
  for(let i=0;i<raw.length;i++)v+=(i+1)*raw.charCodeAt(i);return -3+(v%7);}

function attrs(name,rt,g,p,tier){const opg=Math.max(g-p,0),tb={oro:5,plata:2,bronce:0}[tier];
  return {FIN:clampA(rt+g*2+opg+stableDelta(name,"FIN")),CRE:clampA(rt+tb-2+stableDelta(name,"CRE")),
    DRI:clampA(rt+tb-1+stableDelta(name,"DRI")),CMP:clampA(rt+p*2+tb+stableDelta(name,"CMP")),
    POW:clampA(rt-6+g+stableDelta(name,"POW")),PRS:clampA(rt-10+tb+stableDelta(name,"PRS"))};}
function styleText(rt,g,p,tier){const ps=p/Math.max(g,1);

  let pen=0,og=0,mm=[999,null,null],hats=[];

    const cnt={};for(const g of (x[side]||[])){if(g.penalty)pen++;if(g.owngoal){og++;continue;}
      const min=parseInt((""+(g.minute||"")).split("+")[0])||999;if(min<mm[0])mm=[min,g.name,team];
      cnt[g.name]=(cnt[g.name]||0)+1;}

function statsTorneo(){
  const st={};
  const ms=(DATA.matches||[]).filter(x=>{const ft=(x.score||{}).ft;
    return Array.isArray(ft)&&ft.length===2&&x.team1&&x.team2&&!esEtiqueta(x.team1)&&!esEtiqueta(x.team2);})
    .slice().sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  for(const x of ms){const a=+x.score.ft[0],b=+x.score.ft[1];
    for(const[team,gf,gc]of[[x.team1,a,b],[x.team2,b,a]]){
      const s=st[team]||(st[team]={pj:0,g:0,e:0,p:0,gf:0,gc:0,seq:[]});
      s.pj++;s.gf+=gf;s.gc+=gc;
      if(gf>gc){s.g++;s.seq.push("w");}else if(gf<gc){s.p++;s.seq.push("l");}else{s.e++;s.seq.push("d");}}}
  for(const t in st){const s=st[t];s.pts=s.g*3+s.e;s.dg=s.gf-s.gc;
    s.invicto=s.pj>0&&s.p===0;let r=0;for(let i=s.seq.length-1;i>=0;i--){if(s.seq[i]==="w")r++;else break;}s.rachaV=r;}
  return st;
}
function formaHtml(s){
  if(!s||!s.pj)return `<span class="streak">sin jugar</span>`;
  const dots=s.seq.slice(-5).map(r=>`<span class="dot ${r}"></span>`).join("");
  let ex=s.rachaV>=2?(s.rachaV+"V"):(s.invicto?"Invicto":"");
  return `${dots}<span class="streak">${ex?ex+" · ":""}${s.g}-${s.e}-${s.p} · ${s.gf>=s.gc?"+":""}${s.dg}</span>`;
}

/* ---------- Calendario (hora local) ---------- */
function localDate(date,time){
  const m=/(\d{1,2}):(\d{2})/.exec(time||""),off=/UTC([+-]\d+)/.exec(time||"");
  if(!m||!off||!date)return null;
  const[y,mo,da]=date.split("-").map(Number);
  return new Date(Date.UTC(y,mo-1,da,(+m[1])-(+off[1]),+m[2]));}
function diaTxtD(d){return d.toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"}).toUpperCase();}
function hmD(d){return d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});}
function horaSede(time){const m=/(\d{1,2}:\d{2})/.exec(time||"");return m?m[1]:"";}
function rondaTxt(x){
  if(x.group)return x.group.replace("Group ","Gr ");
  const R={"Round of 32":"16avos","Round of 16":"Octavos","Quarter-finals":"Cuartos",
    "Semi-finals":"Semis","Final":"Final","Match for third place":"3er","Play-off for third place":"3er"};
  return R[x.round]||x.round||"";}
function setCalFilter(c){CALFILT=c;renderCalendario();}
function setCalTeam(t){CALTEAM=t;renderCalendario();}
function scrollHoy(){
  const cont=document.getElementById("tab-calendario");if(!cont)return;
  const today=new Date();today.setHours(0,0,0,0);const tt=today.getTime();
  const seps=[...cont.querySelectorAll(".dsep")];
  const target=seps.find(s=>+s.dataset.ts>=tt)||seps[seps.length-1];
  if(target)target.scrollIntoView({behavior:"smooth",block:"center"});
}
function renderCalendario(){
  if(!DATA)return;
  const ms=(DATA.matches||[]).filter(x=>x.team1&&x.team2);
  const teams=[...new Set(ms.flatMap(x=>[x.team1,x.team2]).filter(t=>!esEtiqueta(t)))].sort();
  let fil=ms.filter(x=>{const ft=(x.score||{}).ft;
    if(CALFILT==="prox")return !ft; if(CALFILT==="jug")return !!ft; return true;});
  if(CALTEAM!=="all")fil=fil.filter(x=>x.team1===CALTEAM||x.team2===CALTEAM);
  const ck=x=>{const d=localDate(x.date,x.time);
    return d?d.getTime():Date.parse((x.date||"2100-01-01")+"T00:00:00Z");};
  fil.sort((a,b)=>ck(a)-ck(b));
  let rows="",lastDay="";
  for(const x of fil){
    const d=localDate(x.date,x.time);
    const dayKey=d?d.toDateString():x.date;
    if(dayKey!==lastDay){lastDay=dayKey;
      const ts=d?new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime():Date.parse(x.date);
      rows+=`<tr class="dsep" data-ts="${ts}"><td colspan="3">${d?diaTxtD(d):x.date}</td></tr>`;}
    const ft=(x.score||{}).ft;
    const mid=ft?`<span class="res">${ft[0]} - ${ft[1]}</span>`:`<span class="vs">vs</span>`;
    const part=`<span class="tagr">${esc(rondaTxt(x))}</span>${flagImg(x.team1)} ${esc(corto(x.team1,15))} ${mid} ${esc(corto(x.team2,15))} ${flagImg(x.team2)}`;
    rows+=`<tr><td class="hora">${d?hmD(d):horaSede(x.time)}</td><td class="pt">${part}</td>`+
      `<td class="sede">${esc(x.ground||"")}</td></tr>`;
  }
  const chips=[["all","Todos"],["prox","Próximos"],["jug","Jugados"]].map(([k,d])=>
    `<button class="fbtn ${CALFILT===k?'on':''}" onclick="setCalFilter('${k}')">${d}</button>`).join("");
  const opts=`<option value="all">Todas las selecciones</option>`+
    teams.map(t=>`<option value="${esc(t)}" ${CALTEAM===t?"selected":""}>${esc(t)}</option>`).join("");
  document.getElementById("tab-calendario").innerHTML=`<div class="panel">
    <div class="acc" style="background:#8b5cf6"></div>
    <h2>CALENDARIO</h2>
    <div class="psub">Horarios en tu hora local · ${fil.length} partidos</div>
    <div class="pbody">
      <div class="fbar"><button class="fbtn" onclick="scrollHoy()">📅 Hoy</button>
        <select class="search" onchange="setCalTeam(this.value)">${opts}</select></div>
      <div class="fbar">${chips}</div>
      <div class="ftwrap"><table class="rank cal"><thead><tr>
      <th>HORA</th><th>PARTIDO</th><th>SEDE</th></tr></thead>
      <tbody>${rows}</tbody></table></div></div></div>`;
}
function flip(id){FLIP[id]=!FLIP[id];const el=document.getElementById(id);
  el.classList.toggle("flip");el.style.transform="";el.classList.remove("tilt");}
function attachTilt(){
  if(window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  if(window.matchMedia("(hover: none)").matches) return;  // mobile/touch: sin tilt (solo tap-flip)
  document.querySelectorAll(".fig").forEach(card=>{
    card.addEventListener("mousemove",e=>{
      if(card.classList.contains("flip"))return;
      const r=card.getBoundingClientRect();
      const px=(e.clientX-r.left)/r.width-.5, py=(e.clientY-r.top)/r.height-.5;
      card.style.transform=`perspective(820px) rotateX(${(-py*9).toFixed(2)}deg) rotateY(${(px*9).toFixed(2)}deg) scale(1.03)`;
      card.style.setProperty("--mx",((px+.5)*100).toFixed(1)+"%");
      card.style.setProperty("--my",((py+.5)*100).toFixed(1)+"%");
      card.classList.add("tilt");
    });
    card.addEventListener("mouseleave",()=>{card.style.transform="";card.classList.remove("tilt");});
  });
}
function setStyle(s){ESTILO=s;renderStats();}
function renderStats(){
  const gs=goleadores();
  let recRows=records().map(([k,v])=>`<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`).join("");
  const total=gs.reduce((s,x)=>s+x.g,0);
  let cards=gs.map((p,i)=>figHtml(p,i)).join("");
  const sel=[["spotlight","Spotlight"],["sticker","Sticker"],["hud","HUD"]].map(([k,d])=>
    `<div class="s ${ESTILO===k?"on":""}" onclick="setStyle('${k}')">${d}</div>`).join("");
  document.getElementById("tab-stats").innerHTML=`
    <div class="panel"><div class="acc" style="background:var(--red)"></div>
      <h2>GOLEADORES</h2><div class="psub">${total} goles · ${gs.length} goleadores · datos reales del torneo</div>
      <div class="pbody">
        <div class="selector"><b style="color:var(--muted);font-size:12px">ESTILO:</b>${sel}</div>
        <div class="hint">ORO 5+ goles · PLATA 3-4 · BRONCE 1-2 · clic para ver el dorso ↺ ${spinnerTxt()}</div>
        <div class="cards ${ESTILO}">${cards||"(Sin goles aún)"}</div>
      </div></div>
    <div class="panel narrow"><div class="acc" style="background:var(--gold)"></div>
      <h2>RÉCORDS DEL TORNEO</h2>
      <div class="pbody"><table class="rank"><tbody>${recRows}</tbody></table></div></div>`;
  attachTilt();
}
let _bajando=false;
function spinnerTxt(){return _bajando?"· descargando fotos…":"";}

/* ---- fotos de Wikipedia (en lote, con CORS origin=*) ---- */
async function bajarFotos(){
  try{const c=localStorage.getItem("wc26photos");if(c)PHOTOS={...JSON.parse(c),...PHOTOS};}catch(e){}
  const gs=goleadores();const faltan=gs.map(p=>p.n).filter(n=>!(n in PHOTOS));
  if(!faltan.length){renderStats();return;}
  _bajando=true;renderStats();
  let huboError=false;
  for(let i=0;i<faltan.length;i+=30){
    const chunk=faltan.slice(i,i+30);
    const url="https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=pageimages&pithumbsize=200&redirects=1&titles="+encodeURIComponent(chunk.join("|"));
    try{const d=await (await fetch(url)).json();const q=d.query||{};
      const norm={};(q.normalized||[]).forEach(x=>norm[x.from]=x.to);
      const redir={};(q.redirects||[]).forEach(x=>redir[x.from]=x.to);
      const byTitle={};Object.values(q.pages||{}).forEach(p=>byTitle[p.title]=(p.thumbnail||{}).source);
      for(const n of chunk){let t=norm[n]||n;t=redir[t]||t;const src=byTitle[t];if(src)PHOTOS[n]=src;else PHOTOS[n]=null;}
      // guardar e ir mostrando las fotos a medida que llegan
      const g={};for(const k in PHOTOS)if(PHOTOS[k])g[k]=PHOTOS[k];
      try{localStorage.setItem("wc26photos",JSON.stringify(g));}catch(e){}
      renderStats();
    }catch(e){huboError=true;}
    await new Promise(r=>setTimeout(r,350));
  }
  if(huboError)setStatus("No se pudieron bajar todas las fotos (ver nota: abrir desde un link, no archivo local)");
  // limpiar nulls para guardar solo encontradas
  const guardar={};for(const k in PHOTOS)if(PHOTOS[k])guardar[k]=PHOTOS[k];
  try{localStorage.setItem("wc26photos",JSON.stringify(guardar));}catch(e){}
  _bajando=false;renderStats();
}

const TABDEF=[["grupos","FASE DE GRUPOS","#1e6bff"],["calendario","CALENDARIO","#8b5cf6"],
  ["terceros","MEJORES TERCEROS","#ee9b00"],["cuadro","CUADRO / ELIMINATORIAS","#00b86b"],
  ["fifa","RANKING FIFA","#00b8d4"],["stats","ESTADÍSTICAS","#e5103b"]];
function renderTabs(){
  document.getElementById("tabs").innerHTML=TABDEF.map(([k,t,c],i)=>
    `<button class="pill ${i===0?"active":""}" id="pill-${k}" role="tab" aria-selected="${i===0}"
      aria-controls="tab-${k}" style="${i===0?"background:"+c:""}"
      onclick="tab('${k}','${c}')">${t}</button>`).join("");
}
function tab(k,c){
  document.querySelectorAll(".pill").forEach(p=>{p.classList.remove("active");p.style.background="";p.setAttribute("aria-selected","false");});
  const pl=document.getElementById("pill-"+k);pl.classList.add("active");pl.style.background=c;pl.setAttribute("aria-selected","true");
  document.querySelectorAll(".tabpage").forEach(p=>p.classList.remove("show"));
  document.getElementById("tab-"+k).classList.add("show");
}
function bannerLines(){
  const svg=document.getElementById("bannerLines");
  const w=window.innerWidth,h=document.querySelector(".banner").clientHeight||104;
  const cols=["#e5103b","#00b86b","#1e6bff"];let s="";
  let i=0;for(let x=-50;x<250;x+=12){const c=cols[i%3];
    s+=`<line x1="${x}" y1="${h+6}" x2="${x+78}" y2="-6" stroke="${c}" stroke-width="3"/>`;
    s+=`<line x1="${w-x}" y1="${h+6}" x2="${w-x-78}" y2="-6" stroke="${c}" stroke-width="3"/>`;i++;}
  svg.setAttribute("width",w);svg.setAttribute("height",h);svg.innerHTML=s;
}
function setStatus(t){document.getElementById("status").textContent=t;}
let _rt;
window.addEventListener("resize",()=>{bannerLines();clearTimeout(_rt);

/* auto-actualizacion (no pisa tu simulacion) */
function hayOverrides(){
  for(const k in REAL){if(JSON.stringify(REAL[k])!==JSON.stringify(SCORES[k]))return true;}
  for(const n in KOWIN){if(KOWIN[n]!==KOREAL[n])return true;}
  return false;
}
setInterval(()=>{if(DATA&&!hayOverrides())actualizar();},600000);

/* parallax sutil del header (solo desktop) */
function initParallax(){
  const bn=document.querySelector(".banner");if(!bn)return;
  if(window.matchMedia("(hover: none)").matches||window.matchMedia("(prefers-reduced-motion: reduce)").matches)return;
  bn.addEventListener("mousemove",e=>{const r=bn.getBoundingClientRect();
    const px=(e.clientX-r.left)/r.width-.5,py=(e.clientY-r.top)/r.height-.5;
    const ti=bn.querySelector(".title"),ln=bn.querySelector(".lines");
    if(ti)ti.style.transform=`translate(${(px*10).toFixed(1)}px,${(py*6).toFixed(1)}px)`;
    if(ln)ln.style.transform=`translate(${(px*-14).toFixed(1)}px,${(py*-8).toFixed(1)}px)`;});
  bn.addEventListener("mouseleave",()=>{const ti=bn.querySelector(".title"),ln=bn.querySelector(".lines");
    if(ti)ti.style.transform="";if(ln)ln.style.transform="";});
}
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));}
